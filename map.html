<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedrock — แผนที่เส้นทาง</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&family=Sarabun:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="map">

  <header class="topbar">
    <a class="brand" href="index.html">Bedrock <small>เรียน Python จากศูนย์</small></a>
    <button id="reset-btn" class="btn btn-ghost">เริ่มใหม่</button>
  </header>

  <main>
    <section class="map-head">
      <h1>เส้นทางของคุณ</h1>
      <p>ก่อขึ้นทีละก้อนหินจากฐานราก ผ่านด่านหนึ่งแล้วด่านถัดไปจะเปิดให้เอง</p>
      <span id="map-progress" class="map-progress"></span>
    </section>

    <!-- เส้นทางหินถูกวาดด้วย JavaScript ใน app.js (renderStonePath) -->
    <div id="map-path"></div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/missions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
