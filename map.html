<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bedrock — แผนที่เส้นทาง</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&family=Sarabun:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="map">

  <header class="topbar">
    <a class="brand" href="index.html">Bedrock <small>เรียน Python จากศูนย์</small></a>
    <button id="reset-btn" class="btn btn-ghost">เริ่มใหม่</button>
  </header>

  <main>
    <section class="map-head">
      <h1>เส้นทางของคุณ</h1>
      <p>ก่อขึ้นทีละก้อนหินจากฐานราก ผ่านด่านหนึ่งแล้วด่านถัดไปจะเปิดให้เอง</p>
      <span id="map-progress" class="map-progress"></span>
    </section>

    <!-- เส้นทางหินถูกวาดด้วย JavaScript ใน app.js (renderStonePath) -->
    <div id="map-path"></div>
  </main>

  <!-- กล่องยืนยันการเริ่มใหม่ (สไตล์เดียวกับแอป ใช้แทน window.confirm) -->
  <div id="confirm-modal" class="modal-backdrop" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="confirm-heading">
    <div class="win-card">
      <h2 id="confirm-heading">เริ่มใหม่ทั้งหมด?</h2>
      <p class="win-msg">ความก้าวหน้าที่ผ่านมาจะถูกลบทั้งหมด แล้วเริ่มจากด่านแรกใหม่</p>
      <div class="win-actions">
        <button id="confirm-reset" class="btn btn-primary">เริ่มใหม่</button>
        <button id="confirm-cancel" class="btn btn-ghost">ยกเลิก</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/missions.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
